version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: vg_postgres
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: dbpassword
      POSTGRES_DB: vg_library
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: